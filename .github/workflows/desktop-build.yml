name: Desktop Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    name: macOS (Apple Silicon)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @clawster/db generate

      - name: Build db package
        run: pnpm --filter @clawster/db build

      - name: Build .dmg
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: packages/desktop
          tauriScript: pnpm tauri
          args: --target aarch64-apple-darwin --bundles dmg

      - uses: actions/upload-artifact@v4
        with:
          name: Clawster-macOS-arm64
          path: packages/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

  build-windows:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @clawster/db generate

      - name: Build db package
        run: pnpm --filter @clawster/db build

      - name: Build .exe
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: packages/desktop
          tauriScript: pnpm tauri
          args: --bundles nsis

      - uses: actions/upload-artifact@v4
        with:
          name: Clawster-Windows-x64
          path: packages/desktop/src-tauri/target/release/bundle/nsis/*.exe
