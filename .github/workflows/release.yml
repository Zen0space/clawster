name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.0)"
        required: true

permissions:
  contents: write

# Prevent two releases racing each other
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ── Step 1: resolve the target version (no tag pushed yet) ─────────────────
  resolve:
    name: Resolve version
    if: >
      (github.event_name == 'pull_request' &&
       github.event.pull_request.merged == true &&
       !contains(github.event.pull_request.title, '[skip release]')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.r.outputs.tag }}
      version: ${{ steps.r.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve target tag
        id: r
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            VERSION=$(jq -r '.version' packages/desktop/package.json)
            TAG="v${VERSION}"
          fi

          # Refuse to silently skip if the tag already exists — fail loudly
          if git rev-parse --verify --quiet "refs/tags/$TAG" >/dev/null; then
            echo "::error::Tag $TAG already exists. Bump packages/desktop/package.json before merging."
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "→ Resolved release: $TAG"

  # ── Step 2: build installers in parallel ──────────────────────────────────
  build:
    name: Build ${{ matrix.name }}
    needs: resolve
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true   # one bad build kills the rest — no half-published releases
      matrix:
        include:
          - name: macOS (Apple Silicon)
            os: macos-14
            target: aarch64-apple-darwin
            bundles: dmg
            artifact: clawster-macos-aarch64
            bundle_ext: dmg
          - name: Windows (x64)
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
            artifact: clawster-windows-x86_64
            bundle_ext: exe

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri
          key: ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @clawster/db generate

      - name: Build db package
        run: pnpm --filter @clawster/db build

      # Tauri v2 doesn't substitute env vars inside tauri.conf.json — inject the
      # signing public key here before building so the updater can verify downloads.
      - name: Inject Tauri signing public key into config
        shell: bash
        env:
          TAURI_SIGNING_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}
        run: |
          node -e "
            const fs = require('fs');
            const p = 'packages/desktop/src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(p, 'utf8'));
            if (!process.env.TAURI_SIGNING_PUBLIC_KEY) throw new Error('TAURI_SIGNING_PUBLIC_KEY secret not set');
            c.plugins.updater.pubkey = process.env.TAURI_SIGNING_PUBLIC_KEY;
            fs.writeFileSync(p, JSON.stringify(c, null, 2));
          "
          echo 'Injected pubkey, first 32 chars:'
          node -e "console.log(JSON.parse(require('fs').readFileSync('packages/desktop/src-tauri/tauri.conf.json','utf8')).plugins.updater.pubkey.slice(0,32))"

      - name: Build desktop app
        working-directory: packages/desktop
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_SIGNING_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}
        run: pnpm tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail
          hash_cmd() {
            if command -v sha256sum >/dev/null 2>&1; then sha256sum "$@"
            else shasum -a 256 "$@"; fi
          }
          mkdir -p dist
          bundle_dir="packages/desktop/src-tauri/target/${{ matrix.target }}/release/bundle"
          # Primary installer (.dmg or .exe)
          for f in "$bundle_dir/dmg"/*.${{ matrix.bundle_ext }} "$bundle_dir/nsis"/*.${{ matrix.bundle_ext }}; do
            [ -f "$f" ] || continue
            base="${{ matrix.artifact }}.${{ matrix.bundle_ext }}"
            cp "$f" "dist/$base"
            (cd dist && hash_cmd "$base" > "$base.sha256")
          done
          # Tauri v2 puts updater artifacts next to the regular bundle
          # when createUpdaterArtifacts is enabled in tauri.conf.json.
          # macOS: .app.tar.gz + .app.tar.gz.sig live in bundle/macos/
          for f in "$bundle_dir/macos"/*.tar.gz "$bundle_dir/macos"/*.tar.gz.sig; do
            [ -f "$f" ] && cp "$f" dist/
          done
          # Windows NSIS: .exe.sig lives in bundle/nsis/ next to the installer
          for f in "$bundle_dir/nsis"/*.exe.sig; do
            [ -f "$f" ] && cp "$f" dist/
          done
          # Sanity check — refuse to upload if no primary installer was produced
          if ! ls dist/*.${{ matrix.bundle_ext }} >/dev/null 2>&1; then
            echo "::error::No ${{ matrix.bundle_ext }} installer found in dist/ for ${{ matrix.name }}"
            exit 1
          fi
          ls -lah dist/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/
          retention-days: 7
          if-no-files-found: error

  # ── Step 3: only when ALL builds succeed, tag and publish atomically ─────
  release:
    name: Tag and Publish
    needs: [resolve, build]
    if: needs.resolve.result == 'success' && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Verify all installers are present
        run: |
          set -euo pipefail
          ls -lah artifacts/
          [ -f artifacts/clawster-macos-aarch64.dmg ] || { echo "::error::macOS installer missing"; exit 1; }
          [ -f artifacts/clawster-windows-x86_64.exe ] || { echo "::error::Windows installer missing"; exit 1; }

      - name: Generate latest.json for the in-app updater
        run: |
          set -euo pipefail
          TAG="${{ needs.resolve.outputs.tag }}"
          VERSION="${{ needs.resolve.outputs.version }}"
          REPO="https://github.com/${{ github.repository }}"
          BASE="${REPO}/releases/download/${TAG}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          MAC_SIG=$(cat artifacts/*.app.tar.gz.sig 2>/dev/null | tr -d '\n' || echo "")
          WIN_SIG=$(cat artifacts/*.exe.sig 2>/dev/null | tr -d '\n' || echo "")
          MAC_TAR=$(ls artifacts/*.app.tar.gz 2>/dev/null | xargs -n1 basename 2>/dev/null || echo "")

          cat > artifacts/latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "See full changelog at ${REPO}/releases/tag/${TAG}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "url": "${BASE}/${MAC_TAR}",
                "signature": "${MAC_SIG}"
              },
              "windows-x86_64": {
                "url": "${BASE}/clawster-windows-x86_64.exe",
                "signature": "${WIN_SIG}"
              }
            }
          }
          EOF
          cat artifacts/latest.json

      # softprops/action-gh-release creates the tag if it doesn't exist,
      # so we publish the release and create the tag in a single atomic step.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          name: ${{ needs.resolve.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: artifacts/*
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
