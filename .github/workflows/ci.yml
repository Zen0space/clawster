name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @clawster/db generate

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm -r --parallel lint

      - name: Ban `as any` casts
        run: |
          if grep -rn --include="*.ts" --include="*.tsx" "as any\b" packages/backend/src packages/desktop/src; then
            echo "::error::Found \`as any\` casts above — use proper types or \`as unknown as <Type>\`"
            exit 1
          fi
          echo "✓ no 'as any' casts found"
